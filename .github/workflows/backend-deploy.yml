name: Backend CI & Deploy (OVH)

on:
  push:
    branches: [dev, main]
    paths:
      - "task-manager-back/**"
      - ".github/workflows/backend-deploy.yml"
  pull_request:
    branches: [dev, main]
    paths:
      - "task-manager-back/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci
  cancel-in-progress: false

jobs:
  ci:
    name: Build backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make mvnw executable (Linux)
        working-directory: task-manager-back
        run: |
          sed -i 's/\r$//' mvnw
          chmod +x mvnw

      - name: Build (skip tests)
        working-directory: task-manager-back
        run: ./mvnw -B -ntp -DskipTests package

  deploy:
    name: Deploy backend on OVH (SSH)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: ci

    concurrency:
      group: ovh-prod-deploy
      cancel-in-progress: false

    steps:
      - name: Deploy (git pull + docker compose up)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          port: ${{ secrets.OVH_SSH_PORT }}
          script: |
            set -euo pipefail

            REPO_DIR="/srv/tasukeru/src/taskmanager"
            COMPOSE_DIR="/srv/tasukeru/compose"
            ENV_FILE="$COMPOSE_DIR/.env"
            COMPOSE_FILE="$COMPOSE_DIR/docker-compose.yml"
            PROJECT_NAME="compose"

            echo "[backend] REPO_DIR=$REPO_DIR"
            echo "[backend] COMPOSE_DIR=$COMPOSE_DIR"
            echo "[backend] COMPOSE_FILE=$COMPOSE_FILE"
            echo "[backend] ENV_FILE=$ENV_FILE"
            echo "[backend] PROJECT_NAME=$PROJECT_NAME"

            test -d "$REPO_DIR" || { echo "::error::REPO_DIR not found: $REPO_DIR"; exit 1; }
            test -d "$COMPOSE_DIR" || { echo "::error::COMPOSE_DIR not found: $COMPOSE_DIR"; exit 1; }
            test -f "$COMPOSE_FILE" || { echo "::error::Compose file not found: $COMPOSE_FILE"; exit 1; }
            test -f "$ENV_FILE" || { echo "::error::Env file not found: $ENV_FILE"; exit 1; }

            command -v docker >/dev/null 2>&1 || { echo "::error::docker not installed on server"; exit 1; }
            docker compose version >/dev/null 2>&1 || { echo "::error::docker compose not available on server"; exit 1; }

            cd "$REPO_DIR"
            git fetch --prune origin
            git checkout -B main origin/main
            git pull --ff-only origin main

            docker ps -a --format '{{.Names}}' | grep '^taskmanager-' | xargs -r docker rm -f || true

            docker compose -p "$PROJECT_NAME" \
              --project-directory "$COMPOSE_DIR" \
              --env-file "$ENV_FILE" \
              up -d db

            docker compose -p "$PROJECT_NAME" \
              --project-directory "$COMPOSE_DIR" \
              --env-file "$ENV_FILE" \
              up -d --build --no-deps --remove-orphans api

            docker compose -p "$PROJECT_NAME" \
              --project-directory "$COMPOSE_DIR" \
              --env-file "$ENV_FILE" \
              ps

            # Healthcheck with retry
            for i in {1..30}; do
              if curl -fsS http://127.0.0.1:8080/actuator/health >/dev/null; then
                echo "Backend OK"
                exit 0
              fi
              sleep 2
            done

            echo "::error::Backend healthcheck failed"
            docker compose -p "$PROJECT_NAME" --project-directory "$COMPOSE_DIR" --env-file "$ENV_FILE" logs --no-color --tail=200 api || true
            exit 1
